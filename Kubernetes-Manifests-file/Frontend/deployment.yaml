apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: student-anett
  labels:
    role: frontend
    env: demo
spec: 
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 25%
  selector:
    matchLabels: 
      role: frontend
  template:
    metadata:
      labels:
        role: frontend
    spec: 
      imagePullSecrets:
      - name: dockerhub-secret
      containers:
      - name: frontend
        image: annevarga/three-tier-frontend:1
        imagePullPolicy: Always
        env:
          - name: REACT_APP_BACKEND_URL
            value: "http://backend-svc.student-anett.svc.cluster.local:8080/api/tasks"
        ports:
        - containerPort: 3000
